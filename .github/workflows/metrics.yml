name: Metrics
on:
  # Schedule updates (each day at midnight)
  schedule: [{cron: "0 0 * * *"}]
  # Lines below allow to run workflow manually and on each commit
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}

          # Options
          user: Raih9K
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Dhaka
          
          # Repositories plugin (shows your top/pinned projects)
          plugin_repositories: yes
          plugin_repositories_featured: Raih9K/Raih9K
          plugin_repositories_order: featured, pinned, starred, random
